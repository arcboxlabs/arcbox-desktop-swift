name: Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0-alpha.1)'
        required: true
        type: string
      arcbox_ref:
        description: 'arcbox repo ref to build Rust from (branch, tag, or SHA)'
        required: false
        default: 'master'
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-dmg:
    name: Build DMG (macOS ARM64)
    runs-on: macos-26
    timeout-minutes: 45
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      dmg: ${{ steps.dmg.outputs.dmg }}

    steps:
      - name: Checkout arcbox-desktop-swift
        uses: actions/checkout@v4

      - name: Checkout arcbox
        uses: actions/checkout@v4
        with:
          repository: arcboxlabs/arcbox
          path: arcbox
          ref: ${{ inputs.arcbox_ref || 'master' }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if echo "$VERSION" | grep -qE '(alpha|beta|rc)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Building version: $VERSION"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install dependencies
        timeout-minutes: 5
        run: brew install protobuf create-dmg

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            arcbox/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('arcbox/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm "$RUNNER_TEMP/cert.p12"

          # Allow codesign to access the keychain without prompt
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Verify
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Store notarization credentials
        env:
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.NOTARY_ISSUER }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$NOTARY_KEY" > "$RUNNER_TEMP/private_keys/AuthKey.p8"
          xcrun notarytool store-credentials "arcbox-notarize" \
            --key "$RUNNER_TEMP/private_keys/AuthKey.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER"
          rm "$RUNNER_TEMP/private_keys/AuthKey.p8"

      - name: Build Rust binaries (release)
        timeout-minutes: 15
        working-directory: arcbox
        run: cargo build --release --locked -p arcbox-cli -p arcbox-daemon

      - name: Prefetch boot-assets
        working-directory: arcbox
        run: |
          codesign --entitlements tests/resources/entitlements.plist \
            --force -s - target/release/arcbox-daemon
          codesign --force -s - target/release/arcbox
          target/release/arcbox boot prefetch

      - name: Build DMG
        id: dmg
        env:
          DESKTOP_REPO: ${{ github.workspace }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          scripts/package-dmg.sh \
            --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            --notarize
          DMG_PATH=$(ls arcbox/target/ArcBox-*.dmg | head -1)
          DMG_NAME=$(basename "$DMG_PATH")
          echo "dmg=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Generate checksum
        run: |
          DMG_PATH="${{ steps.dmg.outputs.dmg_path }}"
          shasum -a 256 "$DMG_PATH" > "${DMG_PATH}.sha256"
          cat "${DMG_PATH}.sha256"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcbox-desktop-dmg
          path: |
            ${{ steps.dmg.outputs.dmg_path }}
            ${{ steps.dmg.outputs.dmg_path }}.sha256
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

  create-release:
    name: Create Release
    needs: [build-dmg]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -type f \( -name '*.dmg' -o -name '*.sha256' \) \
            -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-dmg.outputs.version || github.ref_name }}
          name: ArcBox Desktop ${{ needs.build-dmg.outputs.version || github.ref_name }}
          prerelease: ${{ needs.build-dmg.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.sha256
          body: |
            ## Installation

            Download `${{ needs.build-dmg.outputs.dmg }}`, open the DMG, and drag ArcBox Desktop to Applications.

            Boot-assets and daemon are bundled — no additional setup required.

            ### Verify checksum

            ```bash
            shasum -a 256 -c ${{ needs.build-dmg.outputs.dmg }}.sha256
            ```
